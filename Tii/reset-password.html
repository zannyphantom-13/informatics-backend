<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - The Informatics Initiative</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="login-body">
    <header>
        <a href="index.html">
            <div class="logo-container">
                <svg class="logo-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <polygon points="50,5 90,30 90,70 50,95 10,70 10,30" fill="transparent" stroke="#2a6e62" stroke-width="5"/>
                    <circle cx="50" cy="50" r="10" fill="#2a6e62"/>
                    <path d="M50 5 L50 95 M10 30 L90 70 M10 70 L90 30" stroke="#2a6e62" stroke-width="2"/>
                </svg>
                <h1>THE INFORMATICS INITIATIVE</h1>
            </div>
        </a>
        <nav class="main-nav">
            <a href="curriculum.html">Curriculum</a>
            <a href="lessons.html">Weekly Lessons</a>
            <a href="portal.html">Student Portal</a>
            <a href="feedback.html">Feedback</a>
        </nav>
        <a href="login.html" class="auth-btn" id="auth-button">Login</a>
    </header>

    <main class="login-main">
        <div class="login-container">
            <h2><i class="fas fa-key"></i> Reset Your Password</h2>
            <p style="color: #666; margin-bottom: 20px;">Enter your email and current password to create a new password.</p>

            <form id="reset-password-form">
                <div id="reset-password-error" style="color: #e74c3c; margin-bottom: 15px; display: none;"></div>

                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="security_question"><i class="fas fa-question-circle"></i> Security Question</label>
                    <input type="text" id="security_question" name="security_question" placeholder="Your security question will appear here" readonly style="background-color: #f0f0f0; cursor: not-allowed;">
                </div>

                <div class="form-group">
                    <label for="security_answer"><i class="fas fa-key"></i> Security Answer</label>
                    <input type="text" id="security_answer" name="security_answer" placeholder="Answer to your security question" required>
                </div>

                <div class="form-group password-container">
                    <label for="new-password"><i class="fas fa-lock"></i> New Password</label>
                    <input type="password" id="new-password" name="new_password" placeholder="Enter your new password" required data-target="new-password">
                    <i class="fas fa-eye toggle-password" data-target="new-password"></i>
                </div>

                <div class="form-group password-container">
                    <label for="confirm-password"><i class="fas fa-lock"></i> Confirm New Password</label>
                    <input type="password" id="confirm-password" name="confirm_password" placeholder="Confirm your new password" required data-target="confirm-password">
                    <i class="fas fa-eye toggle-password" data-target="confirm-password"></i>
                </div>

                <div id="password-match-error" style="color: #e74c3c; margin-bottom: 15px; display: none;">
                    ❌ Passwords do not match!
                </div>

                <button type="submit" class="submit-btn login-submit-btn">
                    <i class="fas fa-check"></i> Update Password
                </button>
            </form>

            <div class="register-link" style="margin-top: 20px;">
                <p><a href="login.html" style="color: #2a6e62; text-decoration: none;"><i class="fas fa-arrow-left"></i> Back to Login</a></p>
            </div>
        </div>
    </main>

    <footer>
        <div class="copyright-bar">
            <div class="social-links">
                <a href="https://www.linkedin.com/company/informatics" target="_blank"><i class="fab fa-linkedin-in"></i></a>
                <a href="https://www.twitter.com/informatics" target="_blank"><i class="fab fa-twitter"></i></a>
                <a href="https://www.instagram.com/informatics" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://www.youtube.com/informatics" target="_blank"><i class="fab fa-youtube"></i></a>
                <a href="https://www.facebook.com/informatics" target="_blank"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.tiktok.com/@informatics" target="_blank"><i class="fab fa-tiktok"></i></a>
            </div>
            <p>&copy; 2024 The Informatics Initiative. All rights reserved.</p>
        </div>
    </footer>

    <script type="module">
        import { setupPasswordToggles, handleAuthButton } from './auth.js';
        setupPasswordToggles();
        handleAuthButton();

        // Handle reset password form submission
        const form = document.getElementById('reset-password-form');
        const errorDiv = document.getElementById('reset-password-error');
        const passwordMatchError = document.getElementById('password-match-error');
        const emailInput = document.getElementById('email');
        const securityQuestionInput = document.getElementById('security_question');
        const securityAnswerInput = document.getElementById('security_answer');

        // Fetch security question when email is entered
        emailInput.addEventListener('blur', async () => {
            const email = emailInput.value.trim();
            if (!email) return;

            try {
                const API_URL = (typeof window !== 'undefined' && window.location && window.location.origin) || 'http://localhost:3000';
                
                const response = await fetch(`${API_URL}/api/security-question`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email }),
                });

                const result = await response.json();

                if (response.ok && result.security_question) {
                    securityQuestionInput.value = result.security_question;
                    securityAnswerInput.focus();
                } else {
                    errorDiv.style.display = 'block';
                    errorDiv.textContent = '❌ Email not found in our system.';
                    securityQuestionInput.value = '';
                }
            } catch (error) {
                console.error('Error fetching security question:', error);
                errorDiv.style.display = 'block';
                errorDiv.textContent = '❌ Error retrieving security question.';
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const securityAnswer = document.getElementById('security_answer').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            // Clear previous errors
            errorDiv.style.display = 'none';
            passwordMatchError.style.display = 'none';

            // Validate passwords match
            if (newPassword !== confirmPassword) {
                passwordMatchError.style.display = 'block';
                document.getElementById('confirm-password').focus();
                return;
            }

            // Validate password length
            if (newPassword.length < 6) {
                errorDiv.textContent = '❌ Password must be at least 6 characters long.';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const API_URL = (typeof window !== 'undefined' && window.location && window.location.origin) || 'http://localhost:3000';
                
                const response = await fetch(`${API_URL}/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email,
                        security_answer: securityAnswer,
                        new_password: newPassword
                    }),
                });

                const result = await response.json();

                if (response.ok) {
                    alert('✅ Password updated successfully! Please log in with your new password.');
                    window.location.href = 'login.html';
                } else {
                    errorDiv.textContent = `❌ ${result.message}`;
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                console.error('Reset password error:', error);
                errorDiv.textContent = '❌ A network error occurred. Please try again.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
